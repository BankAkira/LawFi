name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lawfi
          POSTGRES_PASSWORD: lawfi
          POSTGRES_DB: lawfi_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U lawfi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install fastapi uvicorn sqlalchemy asyncpg alembic \
            python-jose bcrypt pydantic pydantic-settings email-validator \
            httpx pytest pytest-asyncio greenlet psycopg2-binary \
            python-dotenv

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://lawfi:lawfi@localhost:5433/lawfi_test
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build
        run: npm run build
